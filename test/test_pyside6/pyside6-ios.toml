[app]
name = "TestPySide6"
bundle-id = "com.alaskafamilysystems.test-pyside6"
version = "1.0"
entry-point = ""
team-id = "8KJB799CU7"
deployment-target = "16.0"

[paths]
pyside6-ios = "../.."
qt-ios = "~/dev/lib/Qt-6/6.8.3/ios"
output-dir = "generated"

[pyside6]
modules = ["QtCore", "QtGui", "QtNetwork", "QtQml", "QtQuick"]

[python]
packages = [
    { src = "myapp", exclude = ["*.pyc", "__pycache__"] },
]
vendor-dir = "vendor"
scripts = ["scripts/app.py"]

[qml]
dirs = ["qml"]
qt-modules = ["QtQuick", "QtQml", "QtCore"]

[resources]
dirs = ["resources/images"]
files = ["resources/fonts/*"]
assets = "Assets.xcassets"
settings-bundle = "Settings.bundle"

[sources]
main-mm = "main.mm"
files = ["native/deviceinfo.mm", "native/appstate.cpp"]
header-search-paths = ["native"]

[bindings]
modules = [
    { name = "AppStateBindings", headers = ["native/appstate.h"], typesystem = "native/typesystem_appstate.xml" },
]

[info-plist]
file = "Info.plist"

[entitlements]
file = "Entitlements.plist"

[signing]
style = "Automatic"

[build-scripts]
pre = ["python3 bin/prebuild.py"]

[build-settings]
CLANG_ENABLE_MODULES = "YES"

[defines]
common = ["DEMO_APP=1"]
debug = ["DEBUG=1"]
